services:
  - type: web
    name: chafik-ghourabi-portfolio
    env: node
    plan: free # or starter, standard, etc.
    buildCommand: "npm install --include=dev && npm run build"
    startCommand: "npm run start"
    autoDeploy: true
    branch: master # or main depending on your repo
    envVars:
      - key: NODE_ENV
        value: production
